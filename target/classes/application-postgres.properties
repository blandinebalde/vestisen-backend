# =============================================================================
# Profil PostgreSQL — catalogue très volumineux (10M+ lignes)
# Démarrage : spring.profiles.active=postgres
# (ou spring.profiles.include=postgres en complément)
#
# ATTENTION : les requêtes natives dans AnnonceRepository / CreditTransactionRepository
# utilisent YEAR(), DATE_SUB(), CURDATE() (syntaxe MySQL). Pour un déploiement PostgreSQL
# pur, il faut les réécrire (date_trunc, generate_series, etc.) ou les remplacer par du JPQL.
# =============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/vendit
spring.datasource.username=vendit
spring.datasource.password=changeme
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Full-text : prévoir index GIN sur to_tsvector(...) en migration SQL
# Partitionnement : par plage de dates sur created_at si besoin

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=vendit-pg-pool

# Écrase l'init SQL MySQL (SET FOREIGN_KEY_CHECKS) du fichier principal
spring.datasource.hikari.connection-init-sql=

# Migrations Flyway du projet sont en syntaxe MySQL (V2__Ensure_annonces_mysql.sql)
spring.flyway.enabled=false

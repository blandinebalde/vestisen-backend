# Server Configuration
server.port=9090
spring.application.name=vendit-backend

# Database Configuration (uniquement la base vendit)
# MySQL 8+ : le connecteur active useInformationSchema=true par défaut ; cela peut faire échouer
# Hibernate (getImportedKeys / lecture FK → SchemaManagementException). Forcer false rétablit
# une lecture compatible (SHOW CREATE TABLE / métadonnées classiques).
spring.datasource.url=jdbc:mysql://localhost:3306/vendit?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&useInformationSchema=false&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Une seule requête par connexion (Hikari n'exécute qu'une instruction à la fois)
spring.datasource.hikari.connection-init-sql=SET FOREIGN_KEY_CHECKS = 0

# HikariCP — ajuster selon charge ; monitoring recommandé (slow query, métriques pool)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=vendit-mysql-pool
# Limite les N+1 sur collections (@ElementCollection images, etc.)
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.batch_size=20

# Flyway : avant Hibernate, assure la présence de annonces / annonce_images (MySQL).
# Bases existantes sans flyway_schema_history : baseline-on-migrate + baseline-version=1,
# puis migration V2 uniquement (> 1). Nouvelle base vide : V2 s'applique directement.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Si le démarrage échoue avec "failed migration to version 3" : exécuter une fois dans MySQL
# le script backend/scripts/mysql-flyway-clear-failed-migration-v3.sql (base vendit), puis redémarrer.

# JPA / Hibernate — schéma des tables (annonces, users, etc.)
# ddl-auto=update : au démarrage, Hibernate crée les tables manquantes ou ajoute colonnes/index/FK.
# IMPORTANT : cela ne s'exécute que si le contexte Spring termine son démarrage. Une erreur avant
# (ex. SchemaManagementException sur une FK) empêche toute mise à jour : corriger la base puis relancer.
# Nom table pour l'entité Annonce : "annonces" (voir @Table sur com.vendit.model.Anonce).
# Secours manuel si Flyway désactivé : backend/create-annonces-table.sql puis relancer.
# Base vide ou tout recréer : décommenter une fois "create" (efface toutes les données), démarrer, puis remettre "update".
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Ne pas fixer default_catalog : avec MySQL 8 + ddl-auto=update, cela peut faire générer des
# ALTER TABLE vendit.annonces ... avant la création de la table → "La table n'existe pas".
# La base est déjà ciblée par jdbc:mysql://.../vendit dans l'URL.
spring.jpa.properties.hibernate.format_sql=true
# individually = une requête métadonnées par table (souvent plus fiable que grouped avec MySQL 8
# quand une FK existante provoque SchemaManagementException / "failed to find column mappings").
# Si l'erreur persiste : exécuter scripts/mysql-drop-problematic-fk.sql puis redémarrer.
spring.jpa.properties.hibernate.hbm2ddl.jdbc_metadata_extraction_strategy=individually
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# File Upload (plusieurs photos par annonce)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB

# File Storage
file.upload-dir=uploads/images

# JWT — durée d'accès (ms). Priorité : variable JWT_EXPIRATION_MS > jwt.expiration-ms > jwt.expiration
# Exemples : 900000=15min, 3600000=1h, 43200000=12h, 86400000=24h
jwt.expiration-ms=${JWT_EXPIRATION_MS:43200000}
jwt.expiration=86400000
# Secret (min. 32 car.) — en production définir JWT_SECRET / jwt.secret via l'environnement
jwt.secret=${JWT_SECRET:Vendit2024SecureJWTSecretKeyForHS512AlgorithmMustBeAtLeast64CharactersLong}
# Purge des entrées de révocation expirées (cron Spring : sec min he jour mois jourSem)
jwt.revoked-cleanup-cron=${JWT_REVOKED_CLEANUP_CRON:0 15 3 * * *}

# --- Durcissement HTTP / erreurs ---
# Ne pas exposer la stack trace aux clients
server.error.include-stacktrace=never
server.error.include-binding-errors=never
# message : on_param = seulement si ?trace (Boot 2.5+), never en prod stricte
server.error.include-message=on_param

# --- JPA / injection SQL (rappel) ---
# Les requêtes @Query utilisent des paramètres nommés (:id) — ne jamais concaténer d'entrée utilisateur dans du SQL.
# Les requêtes natives statiques du projet n'injectent pas de données HTTP.

# Secret dédié (fortement recommandé en prod, distinct de JWT_SECRET) pour le sceau d'intégrité rôle / activation.
# Sans valeur, le sceau utilise jwt.secret (moins isolé).
app.security.privilege-seal-secret=${PRIVILEGE_SEAL_SECRET:}
# Après ajout de la colonne privilege_seal : true = recalcule au démarrage pour les lignes sans sceau ; mettre false en prod stricte une fois la migration faite.
app.security.auto-repair-privilege-seals=${AUTO_REPAIR_PRIVILEGE_SEALS:true}

